# =============================================================================
# docker-compose.yml — Local development for free-llm-hack-proxy (Go)
#
# Usage:
#   docker-compose up --build        # Build and start
#   docker-compose up -d             # Start in background
#   docker-compose down              # Stop and remove containers
#   docker-compose logs -f           # Follow logs
# =============================================================================

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - LOG_LEVEL=debug

    # Inherits HEALTHCHECK from the Dockerfile
